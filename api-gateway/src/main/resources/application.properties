spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=lb://patient-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/patients/**

spring.cloud.gateway.routes[1].id=medicine-service
spring.cloud.gateway.routes[1].uri=lb://medicine-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/medicines/**

spring.cloud.gateway.routes[2].id=prescription-service
spring.cloud.gateway.routes[2].uri=lb://prescription-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/prescriptions/**